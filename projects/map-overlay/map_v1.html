<script>

(function() {
  // =============================================
  // PARTICLE FLOW SIMULATION over real terrain
  // Based on Eric Rannestad's stream table demo
  // =============================================

  
  // ---- Elevation Visualization Layer ----
  let elevCanvas, elevCtx, showElevViz = false, elevOpacity = 0.67, elevRamp = 'terrain';

  const COLOR_RAMPS = {
    terrain: (t) => {
      // Classic terrain: blue-green-yellow-brown-white
      if (t < 0.15) { const f = t / 0.15; return [0, Math.floor(80 + f * 100), Math.floor(200 - f * 80)]; }
      if (t < 0.35) { const f = (t - 0.15) / 0.2; return [Math.floor(f * 60), Math.floor(180 - f * 30), Math.floor(120 - f * 80)]; }
      if (t < 0.55) { const f = (t - 0.35) / 0.2; return [Math.floor(60 + f * 140), Math.floor(150 + f * 50), Math.floor(40 + f * 20)]; }
      if (t < 0.75) { const f = (t - 0.55) / 0.2; return [Math.floor(200 + f * 40), Math.floor(200 - f * 60), Math.floor(60 - f * 30)]; }
      const f = (t - 0.75) / 0.25; return [Math.floor(240 + f * 15), Math.floor(140 + f * 115), Math.floor(30 + f * 225)];
    },
    viridis: (t) => {
      const r = Math.floor(68 + t * 180 - t * t * 200 + t * t * t * 80);
      const g = Math.floor(1 + t * 230 + t * t * 20);
      const b = Math.floor(84 + t * 120 - t * t * 230 + t * t * t * 100);
      return [Math.max(0, Math.min(255, r)), Math.max(0, Math.min(255, g)), Math.max(0, Math.min(255, b))];
    },
    inferno: (t) => {
      const r = Math.floor(t < 0.5 ? t * 2 * 230 : 230 + (t - 0.5) * 2 * 25);
      const g = Math.floor(t < 0.3 ? t * 30 : t < 0.7 ? (t - 0.3) * 2.5 * 200 : 200 + (t - 0.7) * 3.3 * 55);
      const b = Math.floor(t < 0.25 ? 4 + t * 4 * 150 : t < 0.6 ? 154 - (t - 0.25) * 2.86 * 154 : 0);
      return [Math.max(0, Math.min(255, r)), Math.max(0, Math.min(255, g)), Math.max(0, Math.min(255, b))];
    },
    grayscale: (t) => { const v = Math.floor(t * 255); return [v, v, v]; }
  };

  function renderElevViz() {
    if (!elevCanvas || !elevGrid || !showElevViz) {
      if (elevCanvas && elevCtx) elevCtx.clearRect(0, 0, elevCanvas.width, elevCanvas.height);
      return;
    }
    const w = elevCanvas.width, h = elevCanvas.height;
    const imgData = elevCtx.createImageData(w, h);
    const data = imgData.data;

    // Find min/max of current grid
    let lo = Infinity, hi = -Infinity;
    for (let i = 0; i < elevGrid.length; i++) {
      const v = elevGrid[i];
      if (!isNaN(v)) { if (v < lo) lo = v; if (v > hi) hi = v; }
    }
    const range = hi - lo || 1;
    const rampFn = COLOR_RAMPS[elevRamp] || COLOR_RAMPS.terrain;
    const alpha = Math.floor(elevOpacity * 255);

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const g = screenToGrid(x, y);
        if (!g) continue;
        const elev = getElev(g.gx, g.gy);
        if (isNaN(elev)) continue;
        const t = Math.max(0, Math.min(1, (elev - lo) / range));
        const [r, gv, b] = rampFn(t);
        const idx = (y * w + x) * 4;
        data[idx] = r;
        data[idx + 1] = gv;
        data[idx + 2] = b;
        data[idx + 3] = alpha;
      }
    }
    elevCtx.putImageData(imgData, 0, 0);
  }


  // ---- LocalStorage Persistence ----
  const LS_KEY = 'eric-flow-state';

  function saveState() {
    const state = {};
    // All checkboxes
    document.querySelectorAll('.lt-cb').forEach(el => {
      if (el.id) state['cb:' + el.id] = el.checked;
    });
    // Play/pause button mirrors sim-toggle; persist that instead of button state.
    // All range inputs
    document.querySelectorAll('input[type="range"]').forEach(el => {
      if (el.id) state['range:' + el.id] = el.value;
    });
    // All selects
    document.querySelectorAll('select').forEach(el => {
      if (el.id) state['select:' + el.id] = el.value;
    });
    // Expand/collapse states
    document.querySelectorAll('.lt-expand').forEach((el, i) => {
      state['expand:' + i] = el.classList.contains('collapsed');
    });
    document.querySelectorAll('.lt-children').forEach((el, i) => {
      state['children:' + i] = el.classList.contains('collapsed');
    });
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function restoreState() {
    let state;
    try { state = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) {}
    if (!state) return;

    // Restore checkboxes
    document.querySelectorAll('.lt-cb').forEach(el => {
      const key = 'cb:' + el.id;
      if (el.id && key in state) {
        el.checked = state[key];
        el.dispatchEvent(new Event('change'));
      }
    });
    // Restore ranges
    document.querySelectorAll('input[type="range"]').forEach(el => {
      const key = 'range:' + el.id;
      if (el.id && key in state) {
        el.value = state[key];
        el.dispatchEvent(new Event('input'));
      }
    });
    // Restore selects
    document.querySelectorAll('select').forEach(el => {
      const key = 'select:' + el.id;
      if (el.id && key in state) {
        el.value = state[key];
        el.dispatchEvent(new Event('change'));
      }
    });
    // Restore expand/collapse
    document.querySelectorAll('.lt-expand').forEach((el, i) => {
      if (state['expand:' + i]) el.classList.add('collapsed');
      else el.classList.remove('collapsed');
    });
    document.querySelectorAll('.lt-children').forEach((el, i) => {
      if (state['children:' + i]) el.classList.add('collapsed');
      else el.classList.remove('collapsed');
    });
    // Sync play/pause button with sim-toggle
    const simToggle = document.getElementById('sim-toggle');
    const ppBtn = document.getElementById('play-pause-btn');
    if (simToggle && ppBtn) {
      ppBtn.innerHTML = simToggle.checked ? '<span id="pp-icon">&#9646;&#9646;</span><span id="pp-label">pause</span>' : '<span id="pp-icon">&#9654;</span><span id="pp-label">play</span>';
    }
  }

  function wireAutoSave() {
    // Listen for any change in the panel
    const sidebar = document.getElementById('sidebar');
    sidebar.addEventListener('input', saveState);
    sidebar.addEventListener('change', saveState);
    sidebar.addEventListener('click', () => setTimeout(saveState, 50));
    // Also save on play/pause
    const ppBtn = document.getElementById('play-pause-btn');
    if (ppBtn) ppBtn.addEventListener('click', () => setTimeout(saveState, 50));
  }

  // Wire up elevation viz controls
  function wireElevControls() {
    const toggle = document.getElementById('elev-viz-toggle');
    const opSlider = document.getElementById('elev-opacity');
    const opVal = document.getElementById('elev-opacity-val');
    const rampSel = document.getElementById('elev-ramp');

    toggle.addEventListener('change', (e) => {
      showElevViz = e.target.checked;
      // Expand controls when enabled
      const node = toggle.closest('.lt-node');
      if (showElevViz) {
        node.querySelector('.lt-expand').classList.remove('collapsed');
        node.querySelector('.lt-children').classList.remove('collapsed');
      }
      renderElevViz();
    });

    opSlider.addEventListener('input', () => {
      elevOpacity = parseInt(opSlider.value) / 100;
      opVal.textContent = opSlider.value + '%';
      renderElevViz();
    });

    rampSel.addEventListener('change', () => {
      elevRamp = rampSel.value;
      renderElevViz();
    });
  }


  const TILE_SIZE = 256;
  const TERRARIUM_URL = 'https://s3.amazonaws.com/elevation-tiles-prod/terrarium';
  const tileCache = new Map();

  // Size classes from Eric's original
  const sizeClasses = [
    { size: 2, color: '#3366FF' },
    { size: 4, color: '#FFA500' },
    { size: 6, color: '#CC3366' }
  ];

  // State
  let particles = [];
  let elevGrid = null;
  let gridW = 0, gridH = 0;
  let gridBounds = null; // { west, east, north, south }
  let canvasW = 0, canvasH = 0;
  let maxHeat = 1;
  let loading = false;
    renderElevViz();

  // Heat map
  // Store heat in "world pixel" cells at a fixed zoom so it is anchored to the map,
  // but render it each frame in screen space via projection.
  const HEAT_Z = 14;
  const HEAT_CELL = 8; // world pixels at HEAT_Z per heat bucket (storage resolution)
  const HEAT_RENDER_SCALE = 0.25; // render to an offscreen canvas at this scale, then upscale w/ smoothing
  const HEAT_INC = 0.6;
  const HEAT_EPS = 0.01;
  let heatCells = new Map(); // key -> value
  let heatRenderCanvas = null;
  let heatRenderCtx = null;

  // Controls
  let flowRate = 1.0, density = 3.0, damping = 0.97, pSize = 2.5;
  let simActive = true, showHeat = true, decaySec = 30;
  let heatThreshold = 6;
  let turbulence = 0;

  // Canvas + map ref (set later)
  let canvas, ctx, mapRef;

  function terrariumDecode(r, g, b) {
    return (r * 256 + g + b / 256) - 32768;
  }

  function lonToTileX(lon, z) { return Math.floor((lon + 180) / 360 * (1 << z)); }
  function latToTileY(lat, z) {
    const r = lat * Math.PI / 180;
    return Math.floor((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * (1 << z));
  }
  function tileBoundsLonLat(tx, ty, z) {
    const n = 1 << z;
    return {
      lonMin: tx / n * 360 - 180,
      lonMax: (tx + 1) / n * 360 - 180,
      latMax: Math.atan(Math.sinh(Math.PI * (1 - 2 * ty / n))) * 180 / Math.PI,
      latMin: Math.atan(Math.sinh(Math.PI * (1 - 2 * (ty + 1) / n))) * 180 / Math.PI
    };
  }

  async function fetchTile(tx, ty, z) {
    const key = `${z}/${tx}/${ty}`;
    if (tileCache.has(key)) return tileCache.get(key);
    const url = `${TERRARIUM_URL}/${z}/${tx}/${ty}.png`;
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = c.height = TILE_SIZE;
        const cx = c.getContext('2d');
        cx.drawImage(img, 0, 0);
        try {
          const id = cx.getImageData(0, 0, TILE_SIZE, TILE_SIZE);
          const elev = new Float32Array(TILE_SIZE * TILE_SIZE);
          for (let i = 0; i < TILE_SIZE * TILE_SIZE; i++) {
            elev[i] = terrariumDecode(id.data[i*4], id.data[i*4+1], id.data[i*4+2]);
          }
          tileCache.set(key, elev);
          resolve(elev);
        } catch(e) { resolve(null); }
      };
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  async function loadElevation(bounds, zoom) {
    if (loading) return;
    loading = true;
    const status = document.getElementById('elev-status');
    status.textContent = 'Fetching terrain tiles...';

    const z = Math.min(Math.round(zoom), 14);
    const txMin = lonToTileX(bounds.west, z);
    const txMax = lonToTileX(bounds.east, z);
    const tyMin = latToTileY(bounds.north, z);
    const tyMax = latToTileY(bounds.south, z);

    const tilesX = txMax - txMin + 1;
    const tilesY = tyMax - tyMin + 1;
    gridW = tilesX * TILE_SIZE;
    gridH = tilesY * TILE_SIZE;

    const promises = [];
    for (let ty = tyMin; ty <= tyMax; ty++) {
      for (let tx = txMin; tx <= txMax; tx++) {
        promises.push(fetchTile(tx, ty, z).then(d => ({ tx, ty, data: d })));
      }
    }
    const results = await Promise.all(promises);

    elevGrid = new Float32Array(gridW * gridH);
    elevGrid.fill(NaN);
    for (const { tx, ty, data } of results) {
      if (!data) continue;
      const ox = (tx - txMin) * TILE_SIZE;
      const oy = (ty - tyMin) * TILE_SIZE;
      for (let py = 0; py < TILE_SIZE; py++) {
        for (let px = 0; px < TILE_SIZE; px++) {
          elevGrid[(oy + py) * gridW + (ox + px)] = data[py * TILE_SIZE + px];
        }
      }
    }

    const tl = tileBoundsLonLat(txMin, tyMin, z);
    const br = tileBoundsLonLat(txMax, tyMax, z);
    gridBounds = { west: tl.lonMin, east: br.lonMax, north: tl.latMax, south: br.latMin };

    // Find min/max
    let lo = Infinity, hi = -Infinity;
    for (let i = 0; i < elevGrid.length; i++) {
      const v = elevGrid[i];
      if (!isNaN(v)) { if (v < lo) lo = v; if (v > hi) hi = v; }
    }
    status.textContent = `Elevation: ${lo.toFixed(0)}m to ${hi.toFixed(0)}m (${tilesX}x${tilesY} tiles)`;
    loading = false;
  }

  // Map pixel -> elevation grid pixel
  function screenToGrid(sx, sy) {
    if (!gridBounds || !mapRef) return null;
    const lngLat = mapRef.unproject([sx, sy]);
    const lng = lngLat.lng, lat = lngLat.lat;
    const gx = (lng - gridBounds.west) / (gridBounds.east - gridBounds.west) * gridW;
    const gy = (gridBounds.north - lat) / (gridBounds.north - gridBounds.south) * gridH;
    return { gx: Math.floor(gx), gy: Math.floor(gy) };
  }

  function getElev(gx, gy) {
    if (!elevGrid || gx < 0 || gx >= gridW || gy < 0 || gy >= gridH) return NaN;
    return elevGrid[gy * gridW + gx];
  }

  // Gradient descent: sample elevation in 4 directions
  function flowVector(sx, sy) {
    const g = screenToGrid(sx, sy);
    if (!g) return { vx: 0, vy: 0 };
    const sample = 3;
    const here = getElev(g.gx, g.gy);
    if (isNaN(here)) return { vx: 0, vy: 0 };

    // Sample in screen-space offsets, convert each to grid
    const gr = screenToGrid(sx + sample, sy);
    const gl = screenToGrid(sx - sample, sy);
    const gd = screenToGrid(sx, sy + sample);
    const gu = screenToGrid(sx, sy - sample);

    const eR = gr ? getElev(gr.gx, gr.gy) : here;
    const eL = gl ? getElev(gl.gx, gl.gy) : here;
    const eD = gd ? getElev(gd.gx, gd.gy) : here;
    const eU = gu ? getElev(gu.gx, gu.gy) : here;

    // Flow from high to low: negative gradient
    let vx = (isNaN(eR) || isNaN(eL)) ? 0 : (eL - eR);
    let vy = (isNaN(eD) || isNaN(eU)) ? 0 : (eU - eD);
    return { vx, vy };
  }

  // ---- Particle class ----
  class Particle {
    constructor(lngLat, sc) {
      this.lngLat = lngLat; // { lng, lat } anchored to the map
      this.size = sc.size; this.color = sc.color;
      this.vx = 0; this.vy = 0; // velocity in screen pixels per frame
      this.age = 0;
    }
    update() {
      this.age++;
      if (this.age > 2000) return false;
      if (!mapRef) return false;

      // Project geographic position to current screen position
      const p = mapRef.project(this.lngLat);
      const sx = p.x;
      const sy = p.y;
      // Off screen?
      if (sx < -10 || sx > canvasW + 10 || sy < -10 || sy > canvasH + 10) return false;

      const fv = flowVector(sx, sy);
      const strength = flowRate * 0.4;
      this.vx += fv.vx * strength;
      this.vy += fv.vy * strength;
      // Optional turbulence (0 by default; particles start with zero velocity)
      if (turbulence > 0) {
        this.vx += (Math.random() - 0.5) * turbulence;
        this.vy += (Math.random() - 0.5) * turbulence;
      }
      // Damping (larger particles more resistant)
      const sf = (this.size - 2) / 4;
      const d = Math.min(0.99, damping + sf * 0.015);
      this.vx *= d;
      this.vy *= d;

      // Advance in screen space, then unproject back to geographic coords
      const nx = sx + this.vx;
      const ny = sy + this.vy;
      this.lngLat = mapRef.unproject([nx, ny]);

      // Heat map
      if (showHeat) {
        depositHeat(this.lngLat);
      }
      return true;
    }
    draw(ctx) {
      if (!mapRef) return;
      const p = mapRef.project(this.lngLat);
      const sx = p.x;
      const sy = p.y;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(sx, sy, this.size * (pSize / 2.5), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function spawnParticles() {
    // Spawn uniformly throughout an expanded view rect:
    // [-0.5W, 1.5W] × [-0.5H, 1.5H] so particles enter smoothly from all sides.
    const count = Math.floor(density);
    for (let i = 0; i < count; i++) {
      const sc = sizeClasses[Math.floor(Math.random() * sizeClasses.length)];
      const x = (Math.random() * 2 - 0.5) * canvasW;
      const y = (Math.random() * 2 - 0.5) * canvasH;
      if (!mapRef) continue;
      const lngLat = mapRef.unproject([x, y]);
      particles.push(new Particle(lngLat, sc));
    }
  }

  function heatColor(count) {
    if (count <= 0) return null;
    const logC = Math.log(count + 1);
    const logM = Math.log(maxHeat + 1);
    const t = Math.pow(Math.min(logC / logM, 1), 0.6);
    let r, g, b;
    if (t < 0.25)      { const f = t / 0.25;           r = 0; g = f * 255 | 0; b = 255; }
    else if (t < 0.5)  { const f = (t - 0.25) / 0.25;  r = 0; g = 255; b = (1 - f) * 255 | 0; }
    else if (t < 0.75) { const f = (t - 0.5) / 0.25;   r = f * 255 | 0; g = 255; b = 0; }
    else               { const f = (t - 0.75) / 0.25;  r = 255; g = (1 - f) * 255 | 0; b = 0; }
    return `rgba(${r},${g},${b},0.7)`;
  }

  function initHeatGrid() {
    heatCells = new Map();
    maxHeat = 1;
  }

  function worldPxFromLngLat(lng, lat, z) {
    const n = 256 * (1 << z);
    const x = (lng + 180) / 360 * n;
    const sin = Math.sin(lat * Math.PI / 180);
    const y = (0.5 - Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI)) * n;
    return { x, y };
  }

  function lngLatFromWorldPx(x, y, z) {
    const n = 256 * (1 << z);
    const lng = x / n * 360 - 180;
    const t = Math.PI - 2 * Math.PI * (y / n);
    const lat = (180 / Math.PI) * Math.atan(Math.sinh(t));
    return { lng, lat };
  }

  function depositHeat(lngLat) {
    if (!lngLat) return;
    const wp = worldPxFromLngLat(lngLat.lng, lngLat.lat, HEAT_Z);
    const cx = Math.floor(wp.x / HEAT_CELL);
    const cy = Math.floor(wp.y / HEAT_CELL);
    const key = `${cx},${cy}`;
    const next = (heatCells.get(key) || 0) + HEAT_INC;
    heatCells.set(key, next);
    if (next > maxHeat) maxHeat = next;
  }

  function renderHeat(ctx) {
    if (!showHeat || !mapRef || heatCells.size === 0) return;

    const decayRate = 1 / (decaySec * 60);
    // Decay + track max (used for color scaling)
    maxHeat = 1;
    for (const [key, oldVal] of heatCells) {
      const v = oldVal - decayRate;
      if (v <= HEAT_EPS) { heatCells.delete(key); continue; }
      heatCells.set(key, v);
      if (v > maxHeat) maxHeat = v;
    }

    // Render interpolated heat field to an offscreen canvas (low-res),
    // then upscale with smoothing to avoid "blocky" gaps.
    const rw = Math.max(1, Math.ceil(canvasW * HEAT_RENDER_SCALE));
    const rh = Math.max(1, Math.ceil(canvasH * HEAT_RENDER_SCALE));
    if (!heatRenderCanvas) {
      heatRenderCanvas = document.createElement('canvas');
      heatRenderCtx = heatRenderCanvas.getContext('2d');
    }
    if (heatRenderCanvas.width !== rw || heatRenderCanvas.height !== rh) {
      heatRenderCanvas.width = rw;
      heatRenderCanvas.height = rh;
    }

    const img = heatRenderCtx.createImageData(rw, rh);
    const data = img.data;
    const invScale = 1 / HEAT_RENDER_SCALE;

    const keyFor = (cx, cy) => `${cx},${cy}`;
    const sampleHeat = (lngLat) => {
      const wp = worldPxFromLngLat(lngLat.lng, lngLat.lat, HEAT_Z);
      const fx = wp.x / HEAT_CELL;
      const fy = wp.y / HEAT_CELL;
      const x0 = Math.floor(fx), y0 = Math.floor(fy);
      const tx = fx - x0, ty = fy - y0;
      const h00 = heatCells.get(keyFor(x0, y0)) || 0;
      const h10 = heatCells.get(keyFor(x0 + 1, y0)) || 0;
      const h01 = heatCells.get(keyFor(x0, y0 + 1)) || 0;
      const h11 = heatCells.get(keyFor(x0 + 1, y0 + 1)) || 0;
      const a = h00 * (1 - tx) + h10 * tx;
      const b = h01 * (1 - tx) + h11 * tx;
      return a * (1 - ty) + b * ty;
    };

    for (let y = 0; y < rh; y++) {
      const sy = y * invScale;
      for (let x = 0; x < rw; x++) {
        const sx = x * invScale;
        const ll = mapRef.unproject([sx, sy]);
        const v = sampleHeat(ll);
        if (v <= Math.max(HEAT_EPS, heatThreshold)) continue;
        const tcol = heatColor(v);
        if (!tcol) continue;
        // Parse rgba(r,g,b,a)
        const m = tcol.match(/rgba\((\d+),(\d+),(\d+),([0-9.]+)\)/);
        if (!m) continue;
        const idx = (y * rw + x) * 4;
        data[idx] = parseInt(m[1], 10);
        data[idx + 1] = parseInt(m[2], 10);
        data[idx + 2] = parseInt(m[3], 10);
        data[idx + 3] = Math.floor(parseFloat(m[4]) * 255);
      }
    }

    heatRenderCtx.putImageData(img, 0, 0);
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(heatRenderCanvas, 0, 0, canvasW, canvasH);
    ctx.restore();
    return;
  }

  function animate() {
    if (!canvas) { requestAnimationFrame(animate); return; }

    // Resize check
    const rect = canvas.parentElement.getBoundingClientRect();
    if (rect.width !== canvasW || rect.height !== canvasH) {
      canvasW = canvas.width = rect.width;
      canvasH = canvas.height = rect.height;
      initHeatGrid();
      if (elevCanvas) { elevCanvas.width = canvasW; elevCanvas.height = canvasH; renderElevViz(); }
    }

    ctx.clearRect(0, 0, canvasW, canvasH);

    // Heat (anchored to map coords)
    renderHeat(ctx);

    if (simActive && elevGrid) {
      // Spawn
      // Spawn rate scales with density but stays stable at high values.
      const spawnChance = Math.min(1, density / 25);
      if (Math.random() < spawnChance) spawnParticles();
      // Update + draw
      particles = particles.filter(p => {
        if (p.update()) { p.draw(ctx); return true; }
        return false;
      });
      // Cap
      const cap = 25000;
      if (particles.length > cap) particles.splice(0, particles.length - cap);
    }

    requestAnimationFrame(animate);
  }

  // ---- Wire up controls ----
  function wireControls() {
    const bind = (id, valId, setter) => {
      const el = document.getElementById(id);
      const v = document.getElementById(valId);
      const sync = () => { v.textContent = el.value; setter(parseFloat(el.value)); };
      el.addEventListener('input', sync);
      sync(); // ensure initial UI matches initial values
    };
    bind('flow-rate', 'flow-val', v => flowRate = v);
    bind('density', 'density-val', v => density = v);
    bind('damping', 'damping-val', v => damping = v);
    bind('turbulence', 'turbulence-val', v => turbulence = v);
    bind('psize', 'psize-val', v => pSize = v);
    bind('decay', 'decay-val', v => decaySec = v);
    bind('heat-threshold', 'heat-threshold-val', v => heatThreshold = v);
    document.getElementById('sim-toggle').addEventListener('change', e => simActive = e.target.checked);
    document.getElementById('heat-toggle').addEventListener('change', e => showHeat = e.target.checked);
    document.getElementById('clear-heat').addEventListener('click', () => { initHeatGrid(); });
  }

  // ---- Expose init for the map module ----
  window._ericFlow = {
    init(map) {
      mapRef = map;
      canvas = document.getElementById('particle-canvas');
      ctx = canvas.getContext('2d');
      const rect = canvas.parentElement.getBoundingClientRect();
      canvasW = canvas.width = rect.width;
      canvasH = canvas.height = rect.height;
      initHeatGrid();
      wireControls();
        wireElevControls();
        wireAutoSave();
        // Defer restore to after elevation loads
        setTimeout(restoreState, 100);
        
        // Set up elevation canvas
        elevCanvas = document.getElementById('elev-canvas');
        elevCtx = elevCanvas.getContext('2d');
        elevCanvas.width = canvasW;
        elevCanvas.height = canvasH;

      // Load elevation on map idle
      function reload() {
        const b = map.getBounds();
        loadElevation({ west: b.getWest(), east: b.getEast(), north: b.getNorth(), south: b.getSouth() }, map.getZoom());
      }
      map.on('idle', reload);
      reload();

      animate();
    }
  };
})();
</script>

      attr: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' },
  ];

  const basemapBar = document.getElementById('basemap-bar');
  let activeBasemap = 'satellite';
  for (const bm of BASEMAPS) {
    const btn = document.createElement('button');
    if (bm.id === activeBasemap) btn.classList.add('active');
    btn.title = bm.name;
    btn.innerHTML = `<img src="${bm.thumb}" alt="${bm.name}"><span>${bm.name}</span>`;
    btn.addEventListener('click', () => switchBasemap(bm.id));
    basemapBar.appendChild(btn);
  }

  function switchBasemap(id) {
    if (id === activeBasemap) return;
    const bm = BASEMAPS.find(b => b.id === id);
    if (!bm) return;
    activeBasemap = id;
    basemapBar.querySelectorAll('button').forEach((btn, i) => {
      btn.classList.toggle('active', BASEMAPS[i].id === id);
    });
    const src = map.getSource('carto');
    if (src) { src.setTiles(bm.tiles); map.getSource('carto').attribution = bm.attr; }
  }

  // -- Map --
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'carto': {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256,
          attribution: '&copy; <a href="https://www.esri.com/">Esri</a>'
        }
      },
      layers: [{
        id: 'carto-basemap', type: 'raster', source: 'carto', minzoom: 0, maxzoom: 20
      }]
    },
    center: [-105.67, 33.33],
    zoom: 13
  });

  map.on('load', () => {
    // Terrain DEM source for 3D
    map.addSource('terrain-dem', {
      type: 'raster-dem',
      tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
      encoding: 'terrarium', tileSize: 256, maxzoom: 15
    });

    
    // BAER Soil Burn Severity image overlay
    map.addSource('baer-burn', {
      type: 'image',
      url: 'https://guerin.acequia.io/incidents/2024SouthForkSaltFires/SouthFork/SouthFork_SoilBurnSeverity.png',
      coordinates: [[-105.868, 33.446], [-105.553, 33.446], [-105.553, 33.294], [-105.868, 33.294]]
    });
    map.addLayer({
      id: 'baer-burn-layer',
      type: 'raster',
      source: 'baer-burn',
      paint: { 'raster-opacity': 0 }
    });

    // Wire BAER controls
    const baerToggle = document.getElementById('baer-toggle');
    const baerOpSlider = document.getElementById('baer-opacity');
    const baerOpVal = document.getElementById('baer-opacity-val');
    
    baerToggle.addEventListener('change', (e) => {
      const op = e.target.checked ? parseInt(baerOpSlider.value) / 100 : 0;
      map.setPaintProperty('baer-burn-layer', 'raster-opacity', op);
      if (e.target.checked) {
        const node = baerToggle.closest('.lt-node');
        node.querySelector('.lt-expand').classList.remove('collapsed');
        node.querySelector(':scope > .lt-children').classList.remove('collapsed');
      }
    });
    baerOpSlider.addEventListener('input', () => {
      baerOpVal.textContent = baerOpSlider.value + '%';
      if (baerToggle.checked) {
        map.setPaintProperty('baer-burn-layer', 'raster-opacity', parseInt(baerOpSlider.value) / 100);
      }
    });

    // View mode
    const viewBtns = document.querySelectorAll('#view-mode button');
    const exagRow = document.getElementById('exag-row');
    const exagSlider = document.getElementById('terrain-exag');
    const exagVal = document.getElementById('exag-val');
    let currentMode = 'map';

    function setViewMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;
      viewBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      if (mode === 'map') {
        map.setTerrain(null);
        map.setProjection({ type: 'mercator' });
        exagRow.classList.remove('show');
        map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
      } else if (mode === 'terrain') {
        map.setProjection({ type: 'mercator' });
        map.setTerrain({ source: 'terrain-dem', exaggeration: parseFloat(exagSlider.value) });
        exagRow.classList.add('show');
        map.easeTo({ pitch: 60, bearing: -20, duration: 800 });
      } else if (mode === 'globe') {
        map.setTerrain({ source: 'terrain-dem', exaggeration: parseFloat(exagSlider.value) });
        map.setProjection({ type: 'globe' });
        exagRow.classList.add('show');
        map.easeTo({ pitch: 45, bearing: 0, duration: 800 });
      }
    }
    viewBtns.forEach(btn => btn.addEventListener('click', () => setViewMode(btn.dataset.mode)));
    exagSlider.addEventListener('input', () => {
      exagVal.textContent = exagSlider.value;
      if (currentMode !== 'map') map.setTerrain({ source: 'terrain-dem', exaggeration: parseFloat(exagSlider.value) });
    });

    // Init particle simulation
    window._ericFlow.init(map);
  });

  // -- Play/Pause button --
  const playPauseBtn = document.getElementById('play-pause-btn');
  playPauseBtn.addEventListener('click', () => {
    const simToggle = document.getElementById('sim-toggle');
    simToggle.checked = !simToggle.checked;
    simToggle.dispatchEvent(new Event('change'));
    playPauseBtn.innerHTML = simToggle.checked ? '<span id="pp-icon">&#9646;&#9646;</span><span id="pp-label">pause</span>' : '<span id="pp-icon">&#9654;</span><span id="pp-label">play</span>';
    playPauseBtn.title = simToggle.checked ? 'Pause simulation' : 'Play simulation';
  });


  // -- Info modal --
  const infoBtn = document.getElementById('info-btn');
  const infoModal = document.getElementById('info-modal');
  const infoClose = document.getElementById('info-modal-close');
  infoBtn.addEventListener('click', () => infoModal.classList.add('open'));
  infoClose.addEventListener('click', () => infoModal.classList.remove('open'));
  infoModal.addEventListener('click', (e) => {
    if (e.target === infoModal) infoModal.classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') infoModal.classList.remove('open');
  });
</script>

  <div id="info-modal">
    <div id="info-modal-inner">
      <button id="info-modal-close" title="Close">×</button>
      <iframe src="./assets/eric-flow-about.html"></iframe>
    </div>
  </div>

</body></html>
