<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow State — Static Map v4</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>

<body>

<wrapper>
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="map-bottom">
      <div class="coords-container">
        <p id="latContainer"></p>
      </div>
      <div class="meta-container">
        <p id="title"><i>Flow State</i>, 2026<br>
          <a href="https://ericrannestad.com/" target="_blank">Eric Rannestad</a></p>
      </div>
    </div>
  </div>
  <div class="controls-wrapper">
    <div id="custom-map-controls">
      <div id="zoom-container"></div><br>
    </div>
    <div class="right-controls">
      <button id="new-path">new location</button>
      <div id="option-controls">
        <button class="text" id="toggle-options-button">options</button>
        <div class="toggle-container" id="toggle-options-container"></div>
      </div>
      <div class="layer-toggles">
        <label><input type="checkbox" id="toggle-dem"> DEM hillshade</label>
        <label><input type="checkbox" id="toggle-elev-color"> elevation color</label>
        <label><input type="checkbox" id="toggle-satellite"> satellite</label>
        <label><input type="checkbox" id="toggle-middle" checked> noise tiles</label>
        <label><input type="checkbox" id="toggle-text" checked> text overlay</label>
        <label><input type="checkbox" id="toggle-ca" checked> CA water</label>
      </div>
    </div>
  </div>
</wrapper>

</body>

<script>

// Merwin fragments for the text grid layer
var textFragments = Array(270).fill(' ').concat([
  "everything is going to have to be put back.",
  "everything is going to have to be put back.",
  "everything is going to have to be put back.",
  "everything is going to have to be put back.",
  "start with the leaves,",
  "the small twigs,",
  "and the nests that have been",
  "shaken, ripped, or broken off",
  "by the fall;",
  "these must be gathered",
  "and attached once again",
  "to their proper places.",
]);

/** Default view: performance = zoomed out (few tiles); DEM uses correct m/px from WGS84 tile bounds. */
var DEFAULT_LAT = 75.356794;
var DEFAULT_LNG = -151.1143;
var DEFAULT_ZOOM = 14;

var options = {
  mapOptions: { pan: true, mapCenter: { x: DEFAULT_LAT, y: DEFAULT_LNG } },
  uiSettings: { hideControls: false }
};

const s = p => {

  var map = L.map('map', {
    center: [DEFAULT_LAT, DEFAULT_LNG],
    zoom: DEFAULT_ZOOM,
    zoomControl: false,
    crs: L.CRS.EPSG3857
  });

  function getRandomInt(min, max) {
    min = Math.ceil(min);
    max = Math.floor(max);
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function newPath() {
    var randomLat = getRandomInt(25, 78);
    var randomLng = getRandomInt(-175, -60);
    map.setZoom(DEFAULT_ZOOM);
    map.panTo([randomLat, randomLng]);
  }
  document.getElementById('new-path').addEventListener('click', newPath);

  // Options UI
  var toggleOptionsButton = document.getElementById('toggle-options-button');
  var optionsToggleContainer = document.getElementById('toggle-options-container');
  toggleOptionsButton.addEventListener('click', function () {
    optionsToggleContainer.classList.toggle('show');
    toggleOptionsButton.classList.toggle('expanded');
  });

  optionsToggleContainer.innerHTML = `
    <form id="options-form" name="options">
      <div class="row">
        <label for="pan-selection">pan map:</label>
        <select id="pan-selection">
          <option selected value="true">on</option>
          <option value="false">off</option>
        </select>
      </div>
      <div class="row">
        <label for="hide-controls-selection">hide controls:</label>
        <select id="hide-controls-selection">
          <option selected value="false">show</option>
          <option value="true">hide</option>
        </select>
      </div>
    </form>`;

  var form = document.getElementById('options-form');
  form.querySelector('#pan-selection').addEventListener('change', updateOptionsObj);
  form.querySelector('#hide-controls-selection').addEventListener('change', updateOptionsObj);

  function updateOptionsObj() {
    options.mapOptions.pan = form.querySelector('#pan-selection').value;
    options.uiSettings.hideControls = form.querySelector('#hide-controls-selection').value;
    updateUI();
  }

  function updateUI() {
    var controlsWrapper = document.querySelector('.controls-wrapper');
    var mapBottom = document.querySelector('.map-bottom');
    [controlsWrapper, mapBottom].forEach(el => {
      if (options.uiSettings.hideControls === true || options.uiSettings.hideControls === 'true') {
        el.classList.add('hideUI');
      } else {
        el.classList.remove('hideUI');
      }
    });
  }
  updateOptionsObj();

  // ---- DEM Hillshade (Terrarium): extends TileLayer so URL z/x/y matches
  // bottomTiles (zoomOffset + detectRetina) — same slippy grid as Esri imagery.
  // Esri uses .../tile/{z}/{y}/{x}; Terrarium uses .../{z}/{x}/{y}.png — same
  // numeric z,x,y (XYZ); only path order differs. Never use raw coords.z in
  // the URL: use getTileUrl() so z follows _getZoomForUrl() like other layers.

  var DEMHillshade = L.TileLayer.extend({
    options: {
      showElevColor: false,
      maxNativeZoom: 12,
      keepBuffer: 0,
      crossOrigin: true,
      tileSize: 256,
      noWrap: true
    },

    initialize: function (customOpts) {
      L.TileLayer.prototype.initialize.call(this,
        'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png',
        L.extend({}, DEMHillshade.prototype.options, customOpts));
    },

    createTile: function (coords, done) {
      var tile = L.DomUtil.create('canvas', 'leaflet-tile');
      var size = this.getTileSize();
      tile.width = size.x;
      tile.height = size.y;

      var mapRef = this._map;
      if (!mapRef) {
        done(null, tile);
        return tile;
      }

      var nwPx = L.point(coords.x * 256, coords.y * 256);
      var sePx = nwPx.add(L.point(256, 256));
      var nw = mapRef.unproject(nwPx, coords.z);
      var se = mapRef.unproject(sePx, coords.z);

      var R = 6371000;
      var latMid = ((nw.lat + se.lat) / 2) * Math.PI / 180;
      var tileWidthM = Math.abs(se.lng - nw.lng) * (Math.PI / 180) * R * Math.cos(latMid);
      var tileHeightM = Math.abs(nw.lat - se.lat) * (Math.PI / 180) * R;

      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        var offscreen = document.createElement('canvas');
        offscreen.width = img.width;
        offscreen.height = img.height;
        var oc = offscreen.getContext('2d');
        oc.drawImage(img, 0, 0);

        var w = img.width, h = img.height;
        var mPerSrcPixelX = tileWidthM / w;
        var mPerSrcPixelY = tileHeightM / h;
        var px = oc.getImageData(0, 0, w, h).data;

        var elev = new Float32Array(w * h);
        for (var i = 0; i < w * h; i++) {
          var r = px[i * 4], g = px[i * 4 + 1], b = px[i * 4 + 2];
          elev[i] = (r * 256 + g + b / 256) - 32768;
        }

        var ctx = tile.getContext('2d');
        var out = ctx.createImageData(size.x, size.y);
        var scaleX = w / size.x, scaleY = h / size.y;
        var showColor = this.options.showElevColor;

        var eMin = 1e9, eMax = -1e9;
        if (showColor) {
          for (var i = 0; i < elev.length; i++) {
            if (elev[i] < eMin) eMin = elev[i];
            if (elev[i] > eMax) eMax = elev[i];
          }
          if (eMax - eMin < 1) eMax = eMin + 1;
        }

        var alt = 45 * Math.PI / 180;
        var az = 315 * Math.PI / 180;
        var lx = Math.cos(alt) * Math.sin(az);
        var ly = Math.cos(alt) * Math.cos(az);
        var lz = Math.sin(alt);

        for (var ty = 0; ty < size.y; ty++) {
          for (var tx = 0; tx < size.x; tx++) {
            var sx = Math.min(w - 2, Math.max(1, Math.floor(tx * scaleX)));
            var sy = Math.min(h - 2, Math.max(1, Math.floor(ty * scaleY)));

            var dzdx_east = (elev[sy * w + (sx + 1)] - elev[sy * w + (sx - 1)]) / (2 * mPerSrcPixelX);
            var dzdn_north = -(elev[(sy + 1) * w + sx] - elev[(sy - 1) * w + sx]) / (2 * mPerSrcPixelY);

            var nx = -dzdx_east;
            var ny = -dzdn_north;
            var nz = 1;
            var invLen = 1 / Math.sqrt(nx * nx + ny * ny + nz * nz);
            nx *= invLen; ny *= invLen; nz *= invLen;

            var shade = Math.max(0, nx * lx + ny * ly + nz * lz);

            var idx = (ty * size.x + tx) * 4;

            if (showColor) {
              var t = (elev[sy * w + sx] - eMin) / (eMax - eMin);
              t = Math.max(0, Math.min(1, t));
              var cr, cg, cb;
              if (t < 0.15) {
                var f = t / 0.15;
                cr = 46 + f * (140 - 46); cg = 143 + f * (199 - 143); cb = 61 + f * (56 - 61);
              } else if (t < 0.30) {
                var f = (t - 0.15) / 0.15;
                cr = 140 + f * (235 - 140); cg = 199 + f * (219 - 199); cb = 56 + f * (107 - 56);
              } else if (t < 0.50) {
                var f = (t - 0.30) / 0.20;
                cr = 235 + f * (224 - 235); cg = 219 + f * (158 - 219); cb = 107 + f * (77 - 107);
              } else if (t < 0.70) {
                var f = (t - 0.50) / 0.20;
                cr = 224 + f * (184 - 224); cg = 158 + f * (112 - 158); cb = 77 + f * (82 - 77);
              } else if (t < 0.85) {
                var f = (t - 0.70) / 0.15;
                cr = 184 + f * (179 - 184); cg = 112 + f * (179 - 112); cb = 82 + f * (189 - 82);
              } else {
                var f = (t - 0.85) / 0.15;
                cr = 179 + f * (247 - 179); cg = 179 + f * (250 - 179); cb = 189 + f * (255 - 189);
              }
              var mod = 0.5 + 0.5 * shade;
              out.data[idx] = Math.min(255, cr * mod);
              out.data[idx + 1] = Math.min(255, cg * mod);
              out.data[idx + 2] = Math.min(255, cb * mod);
              out.data[idx + 3] = 230;
            } else {
              var v = Math.floor(shade * 255);
              out.data[idx] = v;
              out.data[idx + 1] = v;
              out.data[idx + 2] = v;
              out.data[idx + 3] = 220;
            }
          }
        }
        ctx.putImageData(out, 0, 0);
        done(null, tile);
      }.bind(this);

      img.onerror = function () { done(null, tile); };
      img.src = this.getTileUrl(coords);

      return tile;
    }
  });

  // ---- Satellite layer (Esri) ----
  var satellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; Esri', tileSize: 256, maxZoom: 18 }
  );

  // ---- Bottom tiles (scrambled satellite, same as Shipwreck) ----
  L.TileLayer.NewURL = L.TileLayer.extend({
    getTileUrl: function (coords) {
      var i = getRandomInt(0, 1);
      coords.x = coords.x + i;
      if (getRandomInt(0, 100) < 4) {
        coords.x = coords.x + getRandomInt(0, 50);
        coords.y = coords.y + getRandomInt(0, 50);
      }
      return L.TileLayer.prototype.getTileUrl.call(this, coords);
    }
  });
  L.tileLayer.NewURL = function (url, opts) { return new L.TileLayer.NewURL(url, opts); };

  var bottomTiles = L.tileLayer.NewURL(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { tileSize: 256, zoomOffset: -1, noWrap: true, detectRetina: true }
  );

  var setTileBlur = function (tileObj, threshold) {
    tileObj.randomInt = getRandomInt(0, 100);
    tileObj.tile.dataset.randomInt = tileObj.randomInt;
    if (tileObj.randomInt > threshold) {
      tileObj.tile.classList.add('blur');
      var wrapper = document.createElement('div');
      wrapper.className = 'tile-wrapper';
      tileObj.tile.parentNode.insertBefore(wrapper, tileObj.tile);
      wrapper.appendChild(tileObj.tile);
    }
  };
  bottomTiles.on('tileload', function (tileObj) { setTileBlur(tileObj, 98); });

  // ---- Middle tiles (noise-based visibility) ----
  function generateNoise(x, y) { return p.noise(x, y); }

  var setTileVisibility = function (tileObj, threshold) {
    tileObj.tile.dataset.tileNoiseValue = generateNoise(
      tileObj.tile._leaflet_pos.x / 700,
      tileObj.tile._leaflet_pos.y / 500
    );
    if (tileObj.tile.dataset.tileNoiseValue > threshold) {
      tileObj.tile.classList.add('above-threshold');
      tileObj.tile.classList.remove('below-threshold');
    } else {
      tileObj.tile.classList.remove('above-threshold');
      tileObj.tile.classList.add('below-threshold');
    }
  };

  var middleTiles = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
      tileSize: 64,
      zoomOffset: 1,
      noWrap: true,
      detectRetina: true,
      className: 'noise-visibility-tile'
    }
  );
  middleTiles.on('tileload', function (tileObj) { setTileVisibility(tileObj, 0.5); });

  // ---- Text + line overlay ----
  var textTiles = new L.GridLayer();
  textTiles.createTile = function (coords) {
    var tile = L.DomUtil.create('canvas', 'leaflet-tile');
    var ctx = tile.getContext('2d');
    var size = this.getTileSize();
    tile.width = size.x;
    tile.height = size.y;

    var a = getRandomInt(0, 256), b = getRandomInt(0, 256);
    var c = getRandomInt(0, 256), d = getRandomInt(0, 256);
    var e = getRandomInt(0, textFragments.length - 1);

    ctx.strokeStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(a, b);
    ctx.lineTo(c, d);
    ctx.closePath();
    ctx.stroke();

    ctx.font = 'normal 10px Roboto Mono';
    ctx.fillStyle = 'white';
    ctx.fillText(textFragments[e], 5, a);

    return tile;
  };

  // ---- DEM layer instance ----
  var demLayer = new DEMHillshade({ tileSize: 256, opacity: 0.85, maxNativeZoom: 12 });

  // ---- Add layers in order ----
  bottomTiles.addTo(map);
  // demLayer.addTo(map); // hidden by default
  middleTiles.addTo(map);
  textTiles.addTo(map);

  // ---- Layer toggles ----
  document.getElementById('toggle-dem').addEventListener('change', function (e) {
    if (e.target.checked) demLayer.addTo(map); else map.removeLayer(demLayer);
  });
  document.getElementById('toggle-elev-color').addEventListener('change', function (e) {
    demLayer.options.showElevColor = e.target.checked;
    demLayer.redraw();
  });
  document.getElementById('toggle-satellite').addEventListener('change', function (e) {
    if (e.target.checked) satellite.addTo(map); else map.removeLayer(satellite);
  });
  document.getElementById('toggle-middle').addEventListener('change', function (e) {
    if (e.target.checked) middleTiles.addTo(map); else map.removeLayer(middleTiles);
  });
  document.getElementById('toggle-text').addEventListener('change', function (e) {
    if (e.target.checked) textTiles.addTo(map); else map.removeLayer(textTiles);
  });

  // ---- Zoom control ----
  var zoom = L.control.zoom({ position: 'topleft' });
  zoom.addTo(map);
  document.getElementById('zoom-container').appendChild(zoom.getContainer());

  // ---- Coords + auto-pan ----
  var latContainer = document.getElementById('latContainer');

  setInterval(function () {
    var center = map.getCenter();
    latContainer.innerHTML =
      'latitude: ' + center.lat.toFixed(4) + '<br>longitude: ' + center.lng.toFixed(4);

    if (options.mapOptions.pan === false || options.mapOptions.pan === 'false') return;
    map.panBy([50, 50], { animate: true, duration: 5 });
  }, 1000);

  // ====================================================================
  // Hydrologic CA — ported from map_v9_ca_water_gpu (no erosion/sediment)
  // Only Leaflet adaptation: map.latLngToContainerPoint instead of map.project
  // ====================================================================
  (function () {
    var caCanvas = document.createElement('canvas');
    caCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:450;mix-blend-mode:screen;filter:blur(5px);';
    document.getElementById('map').appendChild(caCanvas);

    var showCALayer = true;
    document.getElementById('toggle-ca').addEventListener('change', function (e) {
      showCALayer = e.target.checked;
    });

    var gl = caCanvas.getContext('webgl2', { premultipliedAlpha: false, alpha: true, antialias: false });
    if (!gl) return;
    gl.getExtension('EXT_color_buffer_float');

    // ---- Shaders ----
    var QUAD_VS = `#version 300 es
      in vec2 a_pos; out vec2 v_uv;
      void main() { v_uv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0.0, 1.0); }`;

    var RENDER_VS = `#version 300 es
      in vec2 a_pos; uniform vec2 u_corners[4]; out vec2 v_uv;
      void main() {
        v_uv = a_pos * 0.5 + 0.5;
        int idx = (a_pos.x > 0.0 ? 1 : 0) + (a_pos.y > 0.0 ? 2 : 0);
        gl_Position = vec4(u_corners[idx], 0.0, 1.0);
      }`;

    var CA_FS = `#version 300 es
      precision highp float;
      in vec2 v_uv;
      uniform sampler2D u_W, u_H, u_valid, u_brush, u_Dir;
      uniform float u_flow, u_rain, u_evap, u_advect;
      uniform vec2 u_texelSize;
      out float outW;
      const ivec2 d8[8] = ivec2[8](
        ivec2(-1,-1), ivec2(0,-1), ivec2(1,-1),
        ivec2(-1, 0),              ivec2(1, 0),
        ivec2(-1, 1), ivec2(0, 1), ivec2(1, 1)
      );
      void main() {
        float v = texture(u_valid, v_uv).r;
        if (v < 0.5) { outW = 0.0; return; }
        float wOrig = texture(u_W, v_uv).r;
        float hHere = texture(u_H, v_uv).r;
        float wHere = wOrig + u_rain + texture(u_brush, v_uv).r;
        if (wHere <= 0.0) { outW = 0.0; return; }
        float sHere = hHere + wHere;
        float flow = clamp(u_flow, 0.0, 1.0);
        float advect = clamp(u_advect, 0.0, 1.0);
        float spreadRate = 0.25 * flow;
        float newW = wHere;
        for (int i = 0; i < 8; i++) {
          vec2 nuv = v_uv + vec2(float(d8[i].x), float(d8[i].y)) * u_texelSize;
          float nv = texture(u_valid, nuv).r;
          if (nv < 0.5) continue;
          float wN = texture(u_W, nuv).r;
          float sN = texture(u_H, nuv).r + wN;
          float diff = sN - sHere;
          float xfer;
          if (diff > 0.0) xfer =  min(spreadRate * diff, 0.5 * wN)    / 8.0;
          else            xfer = -min(spreadRate * (-diff), 0.5 * wHere) / 8.0;
          newW += xfer;
        }
        newW = max(newW, 0.0);
        int myDir = int(texture(u_Dir, v_uv).r + 0.5);
        if (myDir >= 1 && myDir <= 8) newW -= advect * wOrig;
        for (int i = 0; i < 8; i++) {
          vec2 nuv = v_uv + vec2(float(d8[i].x), float(d8[i].y)) * u_texelSize;
          float nv = texture(u_valid, nuv).r;
          if (nv < 0.5) continue;
          int nDir = int(texture(u_Dir, nuv).r + 0.5);
          if (nDir == 8 - i) newW += advect * texture(u_W, nuv).r;
        }
        for (int i = 0; i < 8; i++) {
          vec2 nuv = v_uv + vec2(float(d8[i].x), float(d8[i].y)) * u_texelSize;
          if (texture(u_valid, nuv).r < 0.5) { newW *= 0.4; break; }
        }
        if (myDir == 0) newW *= 0.92;
        newW *= max(0.0, 1.0 - u_evap);
        outW = clamp(newW, 0.0, 1.0e5);
      }`;

    var CA_RENDER_FS = `#version 300 es
      precision highp float;
      in vec2 v_uv;
      uniform sampler2D u_W, u_H, u_FA, u_valid;
      uniform float u_opacity, u_showDem, u_showWater, u_showFA;
      uniform float u_hMin, u_hMax;
      uniform vec2 u_texelSize;
      out vec4 fragColor;
      void main() {
        float v = texture(u_valid, v_uv).r;
        if (v < 0.5) { fragColor = vec4(0.0); return; }
        vec3 result = vec3(0.0); float resultA = 0.0;
        if (u_showDem > 0.5) {
          float hC = texture(u_H, v_uv).r;
          float hL = texture(u_H, v_uv + vec2(-u_texelSize.x, 0.0)).r;
          float hR = texture(u_H, v_uv + vec2( u_texelSize.x, 0.0)).r;
          float hD = texture(u_H, v_uv + vec2(0.0, -u_texelSize.y)).r;
          float hU = texture(u_H, v_uv + vec2(0.0,  u_texelSize.y)).r;
          vec3 normal = normalize(vec3((hL-hR)*2.5, (hD-hU)*2.5, 2.0));
          vec3 light  = normalize(vec3(-1.0, 1.0, 1.0));
          float shade = clamp(dot(normal, light)*0.5+0.5, 0.15, 1.0);
          float nrm   = clamp((hC-u_hMin)/max(1.0,u_hMax-u_hMin), 0.0, 1.0);
          result = vec3(mix(shade, nrm, 0.3)); resultA = 0.7;
        }
        if (u_showFA > 0.5) {
          float fa = texture(u_FA, v_uv).r;
          float t  = pow(fa, 0.5);
          float faA = smoothstep(0.05, 0.3, t) * 0.7 * u_opacity;
          vec3 faC  = mix(vec3(0.05,0.08,0.18), vec3(0.2,0.5,0.95), t);
          result = result*(1.0-faA)+faC*faA; resultA = resultA*(1.0-faA)+faA;
        }
        if (u_showWater > 0.5) {
          float ww = max(0.0, texture(u_W, v_uv).r);
          float t  = 1.0 - exp(-ww * 0.18);
          float wA = smoothstep(0.45, 0.58, ww) * u_opacity;
          vec3 c;
          if      (t < 0.25) { float k=t/0.25;        c=vec3(0.0,k,(160.0+95.0*k)/255.0); }
          else if (t < 0.5)  { float k=(t-0.25)/0.25; c=vec3(k,1.0,1.0-k); }
          else if (t < 0.75) { float k=(t-0.5)/0.25;  c=vec3(1.0,1.0-k,0.0); }

    // ---- DEM fetching ----
    var DEM_Z = 14;
    var DEM_URL = 'https://s3.amazonaws.com/elevation-tiles-prod/terrarium';

    function fetchTile(tx, ty) {

      var promise = new Promise(function (resolve) {
        var img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = function () { resolve(img); };

    }
    async function loadDemForExtent(extent) {
      if (!extent) return;

      var txMin = lonToTileX(extent.lngMin, DEM_Z), txMax = lonToTileX(extent.lngMax, DEM_Z);
      var tyMin = latToTileY(extent.latMax, DEM_Z),  tyMax = latToTileY(extent.latMin, DEM_Z);
      var MAX_TILES = 14;
      var rawMw = (txMax - txMin) + 3, rawMh = (tyMax - tyMin) + 3;
      var mw = Math.min(rawMw, MAX_TILES), mh = Math.min(rawMh, MAX_TILES);

    // ---- D8 flow accumulation (priority-flood sink-fill + BFS) ----
    function computeFlowAccumulation(heights, valid, n) {

        heap.push([h, idx]);

        if (x===0||x===n-1||y===0||y===n-1||

            (y>0&&valid[k-n]<128)||(y<n-1&&valid[k+n]<128))

      }

        var item = pop(), ph = item[0], idx = item[1];
        var cx = idx%n, cy = (idx/n)|0;
        for (var d = 0; d < 8; d++) {
          var nx = cx+dx8[d], ny = cy+dy8[d];

    // ---- Terrain rebuild ----
    function sampleBaseTerrain() {
      if (!demHeights || !simExtent) return;
      var dw = demCanvas.width, dh = demCanvas.height;
      baseHData.fill(0); vData.fill(0);

      // in latitude. The render UV interpolates linearly in screen (Mercator)
      // space, so the two must use the same spacing or the overlay drifts
      // relative to the satellite tiles — especially at high latitudes where
      // Mercator distortion is large across the extended (50%) simulation extent.
      var wxW = worldPxFromLngLat(simExtent.lngMin, 0, DEM_Z).x; // west x
      var wxE = worldPxFromLngLat(simExtent.lngMax, 0, DEM_Z).x; // east x
      var wyN = worldPxFromLngLat(0, simExtent.latMax, DEM_Z).y; // north y (smaller)
      var wyS = worldPxFromLngLat(0, simExtent.latMin, DEM_Z).y; // south y (larger)

        var vv = y / (gpuN - 1);

          var uu = x / (gpuN - 1);

      // Raw meter values on flat terrain produce near-zero diffs between cells,
      // making the CA ignore topography entirely. Normalizing to a fixed range

        if (baseHData[k] > hMax) hMax = baseHData[k];

    function recomputeFlowAccumulation() {

    // ---- Rain brush (always zero — rain comes from u_rain uniform) ----

      if (!brushDirty || !brushData) return;

    var caParams = { run: true, flow: 0.4, rain: 1.76, rainAmp: 8.73, rainPeriod: 2324, evap: 0.008, faBoost: 30.0, opacity: 1.0 };
    function currentRainLevel() {

    }

    function gpuCaStep() {

    // ---- Render ----
    function lngLatToNdc(lng, lat) {
      var p = map.latLngToContainerPoint(L.latLng(lat, lng));

    function gpuRender() {

      gl.uniform1f(gl.getUniformLocation(renderProg, 'u_showFA'),    0.0);
      gl.uniform1f(gl.getUniformLocation(renderProg, 'u_hMin'),      0.0);
      gl.uniform1f(gl.getUniformLocation(renderProg, 'u_hMax'),    100.0);
      gl.uniform2f(gl.getUniformLocation(renderProg, 'u_texelSize'), 1.0/gpuN, 1.0/gpuN);
      gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      gl.disable(gl.BLEND);
    }

    // ---- Extent apply ----
    // Load new DEM in the background without touching live state.
    // simExtent and demHeights only swap in once the tiles are ready,
    // so the existing simulation keeps running uninterrupted during the load.
    var simLoading = false;
    async function applySimExtent(extent) {
      if (simLoading) return;
      simLoading = true;
      try {
        var pendingHeights = demHeights; // keep old reference live
        await loadDemForExtent(extent);
        if (!demHeights) { demHeights = pendingHeights; return; }
        simExtent = extent;
        clearBrush();
        mappingDirty = true;
      } catch (e) { console.error('CA DEM:', e); }
      finally { simLoading = false; }
    }

    // ---- Frame loop ----
    var lastFaTime = 0;
    var FA_INTERVAL = 5000;

    function extentDriftExceeded() {
      if (simLoading || !simExtent) return false;
      var c = map.getCenter();
      var cx = (simExtent.lngMin + simExtent.lngMax) / 2;
      var cy = (simExtent.latMin + simExtent.latMax) / 2;
      var hw = (simExtent.lngMax - simExtent.lngMin) * 0.2;
      var hh = (simExtent.latMax - simExtent.latMin) * 0.2;
      return Math.abs(c.lng - cx) > hw || Math.abs(c.lat - cy) > hh;
    }

    map.on('zoomend', function () { applySimExtent(getViewportDefaultExtent()); });

    function caResize() {
      var r = caCanvas.getBoundingClientRect();
      var dpr = Math.max(1, window.devicePixelRatio || 1);
      var w = Math.max(1, Math.floor(r.width * dpr));
      var h = Math.max(1, Math.floor(r.height * dpr));
      if (caCanvas.width !== w || caCanvas.height !== h) { caCanvas.width = w; caCanvas.height = h; }
    }

    function caFrame() {
      caResize();
      var now = performance.now();
      if (demHeights && gpuN > 0 && simExtent) {
        if (mappingDirty) { rebuildGpuTerrain(); mappingDirty = false; }
        if (caParams.run) { uploadBrush(); gpuCaStep(); clearBrush(); }
        if (now - lastFaTime > FA_INTERVAL) recomputeFlowAccumulation();
        if (extentDriftExceeded()) applySimExtent(getViewportDefaultExtent());
        if (showCALayer) gpuRender();
        else {
          gl.bindFramebuffer(gl.FRAMEBUFFER, null);
          gl.viewport(0, 0, caCanvas.width, caCanvas.height);
          gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
        }
      } else {
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, caCanvas.width, caCanvas.height);
        gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
      }
      requestAnimationFrame(caFrame);
    }

    gpuAlloc(512);
    clearBrush();
    applySimExtent(getViewportDefaultExtent());
    caFrame();
  })();

  // Animate noise middle-layer tiles (class set on tile images by Leaflet)
  setInterval(function () {
    var tiles = document.querySelectorAll('img.leaflet-tile.noise-visibility-tile');
    for (var i = 0; i < tiles.length; i++) {
      var v = parseFloat(tiles[i].dataset.tileNoiseValue || 0.5);
      v += (Math.random() - 0.5) * 0.02;
      tiles[i].dataset.tileNoiseValue = v;
      if (v > 0.5) {
        tiles[i].classList.add('above-threshold');
        tiles[i].classList.remove('below-threshold');
      } else {
        tiles[i].classList.remove('above-threshold');
        tiles[i].classList.add('below-threshold');
      }
    }
  }, 1000);

};

new p5(s);

</script>
